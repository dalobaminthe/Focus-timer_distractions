<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="fondAnime" id="fondAnime"></div>

  <main class="conteneur">
    <h1 class="titre">Focus Timer</h1>

    <div class="affichageMinuteur">
      <span id="minutes">25</span>:<span id="secondes">00</span>
    </div>

    <p id="etatSession" class="etatSession">Prêt à démarrer</p>
    <div class="reglages">
      <label class="reglageLigne">
        Focus
        <button class="boutonAjustement" data-cible="focus" data-delta="-1">−</button>
        <span id="valeurFocus">25</span> min
        <button class="boutonAjustement" data-cible="focus" data-delta="1">+</button>
      </label>

      <label class="reglageLigne">
        Pause
        <button class="boutonAjustement" data-cible="pause" data-delta="-1">−</button>
        <span id="valeurPause">5</span> min
        <button class="boutonAjustement" data-cible="pause" data-delta="1">+</button>
      </label>
    </div>
    <div class="boutons">
      <button id="boutonDemarrer" class="bouton bouton--principal">Démarrer</button>
      <button id="boutonPause" class="bouton" disabled>Pause</button>
      <button id="boutonReinitialiser" class="bouton bouton--secondaire">Réinitialiser</button>
    </div>

    <div id="modaleDistraction" class="modale" hidden>
      <div class="modaleContenu">
        <p class="modaleTitre">Tu es parti·e pendant la session !</p>
        <p class="modaleSousTitre">Qu'est-ce qui t'a distrait·e ?</p>
        <div class="raisonsDistraction">
          <button class="boutonRaison" data-raison="Notification">Notification 📱</button>
          <button class="boutonRaison" data-raison="Faim">Faim 🍜️</button>
          <button class="boutonRaison" data-raison="Fatigue">Fatigue 💤️</button>
          <button class="boutonRaison" data-raison="Pensée">Pensée qui traîne 💭</button>
          <button class="boutonRaison" data-raison="Autre">Autre ...</button>
        </div>
      </div>
    </div>
  </main>
  <button id="boutonRapport" class="boutonRapport">Voir mon rapport 📊</button>

  <div id="modaleRapport" class="modale" hidden>
    <div class="modaleContenu modaleContenu--rapport">
      <p class="modaleTitre">Ton rapport de focus</p>
      <div id="contenuRapport" class="contenuRapport"></div>
      <button id="boutonFermerRapport" class="bouton bouton--secondaire">Fermer</button>
    </div>
  </div>
  <footer class="signature">Créé par Daloba MINTHE</footer>

  <script src="script.js"></script>
</body>
</html>
